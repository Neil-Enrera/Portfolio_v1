@if (opened()) {
  <div
    class="fixed inset-0 z-[70] animate-gallery-backdrop"
    role="dialog"
    aria-modal="true"
    aria-label="Image gallery"
    (click)="onBackdropClick($event)"
  >
    <div class="absolute inset-0 bg-black/85"></div>

    <div class="gallery-content-wrapper relative z-20 flex flex-col h-full" (click)="$event.stopPropagation()">
      <!-- Header -->
      <div class="flex items-center justify-between w-full px-4 py-3 md:px-6">
        <span class="text-[11px] uppercase tracking-widest text-white/50 select-none">
          Image {{ currentIndex() + 1 }} of {{ images().length }}
        </span>
        <div class="flex items-center gap-3">
          @if (zoomed()) {
            <span class="text-[10px] uppercase tracking-widest text-white/40 hidden sm:inline">
              Drag to pan
            </span>
          }
          <button
            #closeBtn
            (click)="closed.emit(); zoomed.set(false); panX.set(0); panY.set(0);"
            class="w-8 h-8 border border-white/20 bg-black/30 flex items-center justify-center text-white/70 hover:text-white hover:border-white/50 transition-colors cursor-pointer"
            aria-label="Close gallery"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Image area -->
      <div class="flex-1 flex items-center justify-center w-full min-h-0 relative overflow-hidden">
        @if (images().length > 1) {
          <button
            (click)="prev()"
            class="absolute left-2 md:left-4 z-20 w-10 h-10 border border-white/15 bg-black/40 flex items-center justify-center text-white/60 hover:text-white hover:bg-black/70 hover:border-white/40 transition-all cursor-pointer"
            aria-label="Previous image"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
        }

        <div
          class="gallery-content relative flex items-center justify-center w-full h-full p-4 md:p-8 select-none"
          [style.cursor]="zoomed() ? 'grabbing' : 'zoom-in'"
          (click)="onImageClick($event)"
          (dblclick)="onImageDblClick($event)"
          (mousedown)="onMouseDown($event)"
          (mousemove)="onMouseMove($event)"
          (mouseup)="onMouseUp()"
          (mouseleave)="onMouseUp()"
          (touchstart)="onTouchStart($event)"
          (touchmove)="onTouchMove($event)"
          (touchend)="onTouchEnd($event)"
        >
          <img
            [src]="images()[currentIndex()]"
            [alt]="'Image ' + (currentIndex() + 1) + ' of ' + images().length"
            class="animate-gallery-image max-w-full max-h-[85vh] w-auto h-auto object-contain pointer-events-none select-none"
            [class.zoomed]="zoomed()"
            [style.transform]="'translate(' + panX() + 'px, ' + panY() + 'px)'"
            draggable="false"
          />
        </div>

        @if (images().length > 1) {
          <button
            (click)="next()"
            class="absolute right-2 md:right-4 z-20 w-10 h-10 border border-white/15 bg-black/40 flex items-center justify-center text-white/60 hover:text-white hover:bg-black/70 hover:border-white/40 transition-all cursor-pointer"
            aria-label="Next image"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        }
      </div>

      <!-- Dot navigation -->
      @if (images().length > 1) {
        <div class="flex items-center justify-center gap-1.5 py-3 px-4">
          @for (img of images(); track $index) {
            <button
              class="w-2 h-2 rounded-full border transition-all duration-200 cursor-pointer"
              [class.bg-white/60]="$index === currentIndex()"
              [class.border-white/60]="$index === currentIndex()"
              [class.bg-white/20]="$index !== currentIndex()"
              [class.border-white/20]="$index !== currentIndex()"
              [class.w-3]="$index === currentIndex()"
              (click)="goToImage($index)"
              [attr.aria-label]="'Go to image ' + ($index + 1)"
            ></button>
          }
        </div>
      }
    </div>
  </div>
}
