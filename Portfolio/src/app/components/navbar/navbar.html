<nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b border-gray-200 transition-all duration-300" [class]="isScrolled() ? 'shadow-xs' : ''">
  <div class="section-container">
    <div class="flex items-center justify-between h-14 md:h-16">
      <button (click)="scrollTo('hero')" class="flex items-center gap-2 cursor-pointer group">
        <span class="text-base font-bold tracking-tight text-gray-900">
          <span class="text-gray-900">NE</span>
          <span class="text-gray-400">~</span>
        </span>
        <span class="hidden sm:inline text-[11px] text-gray-400 font-medium tracking-wider uppercase">Full Stack Developer</span>
      </button>

      <div class="hidden md:flex items-center gap-6">
        @for (item of navItems; track item.label) {
          <button
            (click)="scrollTo(item.section)"
            type="button"
            class="relative text-[12px] uppercase tracking-widest font-medium py-1 cursor-pointer transition-colors duration-150"
            [class.text-gray-900]="activeSection() === item.section"
            [class.text-gray-400]="activeSection() !== item.section"
            [class.hover:text-gray-900]="activeSection() !== item.section"
          >
            {{ item.label }}
            @if (activeSection() === item.section) {
              <span class="absolute -bottom-0.5 left-0 right-0 h-px bg-gray-900"></span>
            }
          </button>
        }
      </div>

      <button
        (click)="toggleMenu()"
        class="md:hidden p-2 text-gray-900 cursor-pointer"
        aria-label="Toggle menu"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if (isMobileMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
          }
        </svg>
      </button>
    </div>

    @if (isMobileMenuOpen()) {
      <div class="md:hidden pb-4 border-t border-gray-100">
        <div class="flex flex-col gap-1 pt-3">
          @for (item of navItems; track item.label) {
            <button
              (click)="scrollTo(item.section)"
              type="button"
              class="text-left text-[12px] uppercase tracking-widest font-medium py-2 px-1 cursor-pointer transition-colors"
              [class.text-gray-900]="activeSection() === item.section"
              [class.text-gray-400]="activeSection() !== item.section"
            >
              {{ item.label }}
            </button>
          }
        </div>
      </div>
    }
  </div>
</nav>
