<nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-sm transition-all duration-300">
  <div class="section-container">
    <div class="flex items-center justify-between h-16 md:h-20">
      <button (click)="scrollTo('hero')" class="flex items-center gap-3 cursor-pointer">
        <span class="text-xl font-bold tracking-tight">
          <span class="text-navy-900">NE</span>
          <span class="text-accent">.</span>
        </span>
        <span class="hidden sm:inline text-xs text-slate-500 font-medium tracking-wide">Full Stack Developer</span>
      </button>

      <div class="hidden md:flex items-center gap-1">
        @for (item of navItems; track item.label) {
          <button
            (click)="scrollTo(item.section)"
            type="button"
            class="nav-link"
            [class.active]="activeSection() === item.section"
            [attr.aria-current]="activeSection() === item.section ? 'section' : null"
          >
            {{ item.label }}
          </button>
        }
      </div>

      <div class="flex items-center gap-1">
        <button
          (click)="toggleDarkMode()"
          class="p-2 text-slate-500 hover:text-navy-900 transition-colors cursor-pointer"
          [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (isDarkMode()) {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
          } @else {
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          }
        </button>
        <button
          (click)="toggleMenu()"
          class="md:hidden p-2 text-navy-900 cursor-pointer"
          aria-label="Toggle menu"
        >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if (isMobileMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          }
        </svg>
      </button>
    </div>

    <div class="mobile-menu md:hidden border-t border-slate-100" [class.open]="isMobileMenuOpen()">
      <div class="flex flex-col gap-2 pt-4">
        @for (item of navItems; track item.label) {
          <button
            (click)="scrollTo(item.section)"
            type="button"
              class="nav-link text-left"
              [class.active]="activeSection() === item.section"
              [attr.aria-current]="activeSection() === item.section ? 'section' : null"
            >
              {{ item.label }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
</nav>
